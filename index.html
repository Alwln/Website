<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVDB Security &amp; Protection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0a1729;
    --navy-soft:#0e1f38;
    --gold:#d4af37;
    --gold-bright:#e8c662;
    --ink:#f4f1ea;
    --muted:#8b9bb0;
    --line:rgba(212,175,55,.22);
    --black: #000000;

  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background-color: var(--black);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100%;
    display:flex;
    flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  /* language toggle */
  .lang{
    position:absolute;top:clamp(16px,4vw,28px);right:clamp(16px,4vw,28px);
    display:flex;gap:2px;font-size:13px;letter-spacing:.04em;
    border:1px solid var(--line);border-radius:999px;overflow:hidden;
    background:rgba(8,18,33,.5);backdrop-filter:blur(4px);z-index:5;
  }
  .lang button{
    background:none;border:0;color:var(--muted);
    font-family:inherit;font-size:inherit;letter-spacing:inherit;
    padding:7px 14px;cursor:pointer;transition:color .2s,background .2s;
  }
  .lang button.active{color:var(--navy);background:var(--gold);font-weight:500}
  .lang button:not(.active):hover{color:var(--ink)}

  main{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:clamp(28px,7vw,72px) 20px;gap:0;
  }

  /* emblem */
  .emblem{
    position:relative;width:clamp(96px,22vw,128px);aspect-ratio:1;
    margin-bottom:clamp(28px,5vw,40px);
    display:grid;place-items:center;
  }
  .emblem .ring{
    position:absolute;inset:0;border-radius:50%;
    border:1px solid var(--line);
  }
  .emblem .ring::before{
    content:"";position:absolute;inset:-1px;border-radius:50%;
    border:1px solid transparent;
    border-top-color:var(--gold);border-right-color:var(--gold);
    animation:spin 14s linear infinite;
  }
  .emblem .glow{
    position:absolute;inset:14%;border-radius:50%;
    background:radial-gradient(circle, rgba(212,175,55,.18), transparent 70%);
  }
  .emblem svg{width:46%;height:46%;position:relative;color:var(--gold-bright)}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.emblem .ring::before{animation:none}}

  .eyebrow{
    font-size:clamp(11px,2.4vw,13px);letter-spacing:.34em;text-transform:uppercase;
    color:var(--gold);margin-bottom:clamp(20px,4vw,28px);font-weight:500;
  }
  h1{
    font-family:'Cormorant Garamond',serif;font-weight:500;
    font-size:clamp(2.1rem,6.4vw,3.6rem);line-height:1.08;
    letter-spacing:.005em;max-width:14ch;margin-bottom:clamp(16px,3vw,22px);
  }
  h1 .accent{color:var(--gold-bright)}
  p.lead{
    color:var(--muted);font-size:clamp(.98rem,2.5vw,1.12rem);line-height:1.65;
    max-width:46ch;margin-bottom:clamp(34px,6vw,44px);
  }
  .cta{
    display:inline-flex;align-items:center;gap:.6em;
    font-family:'Inter',sans-serif;font-size:clamp(.92rem,2.3vw,1rem);font-weight:500;
    letter-spacing:.02em;color:var(--navy);
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    padding:.95em 1.8em;border-radius:999px;text-decoration:none;
    box-shadow:0 8px 28px -10px rgba(212,175,55,.55);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .cta:hover{transform:translateY(-2px);box-shadow:0 14px 34px -10px rgba(212,175,55,.7)}
  .cta:focus-visible{outline:2px solid var(--gold-bright);outline-offset:3px}
  .cta svg{width:1em;height:1em;transition:transform .18s ease}
  .cta:hover svg{transform:translateX(3px)}

  footer{
    border-top:1px solid var(--line);
    padding:clamp(18px,4vw,24px) 20px;
    display:flex;flex-wrap:wrap;gap:.5em 1.6em;justify-content:center;align-items:center;
    color:var(--muted);font-size:clamp(.8rem,2vw,.9rem);
  }
  footer a{color:var(--muted);text-decoration:none;transition:color .2s}
  footer a:hover{color:var(--gold-bright)}
  footer .sep{color:var(--line)}
</style>
</head>
<body>
  <div class="lang" role="group" aria-label="Taal / Language">
    <button id="btn-nl" class="active" onclick="setLang('nl')">NL</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <main>
    <div class="emblem" aria-hidden="true">
      <span class="ring"></span>
      <span class="glow"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2.5 4.5 5.5v5.2c0 4.7 3.2 8.3 7.5 9.8 4.3-1.5 7.5-5.1 7.5-9.8V5.5z"/>
        <rect x="9" y="11" width="6" height="5" rx="1"/>
        <path d="M10 11V9.6a2 2 0 0 1 4 0V11"/>
      </svg>
    </div>

    <p class="eyebrow">AVDB Security &amp; Protection</p>
    <h1 id="h1"></h1>
    <p class="lead" id="lead"></p>
    <a class="cta" id="cta" href="services.html">
      <span id="cta-text"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </main>

  <footer>
    <a href="mailto:contact@avdbsecurity.com">contact@avdbsecurity.com</a>
    <span class="sep">|</span>
    <a href="tel:+31643115610">+31 6 43115610</a>
  </footer>

<script>
  const t = {
    nl:{
      h1:'We werken aan de <span class="accent">website</span>',
      lead:'Onze diensten lopen gewoon door, maar onze website wordt vernieuwd! We hopen zo snel mogelijk weer volledig online te zijn! Stuur ons een email met "Hou me op de hoogte!" als u op de hoogte gehouden wil worden wanneer dit nieuwe project af is!',
      cta:'Bekijk onze diensten',
      title:'AVDB Security & Protection — In onderhoud'
    },
    en:{
      h1:'We\u2019re working on the <span class="accent">website</span>',
      lead:'Our services continue as normal, but our website is being renewed We hope to be online as fast as possible. Send us an email with "Keep me updated!" if you want to get updated when this new project is done! ',
      cta:'View our services',
      title:'AVDB Security & Protection — Under maintenance'
    }
  };
  function setLang(l){
    const d=t[l];
    document.documentElement.lang=l;
    document.getElementById('h1').innerHTML=d.h1;
    document.getElementById('lead').textContent=d.lead;
    document.getElementById('cta-text').textContent=d.cta;
    document.title=d.title;
    document.getElementById('btn-nl').classList.toggle('active',l==='nl');
    document.getElementById('btn-en').classList.toggle('active',l==='en');
    document.getElementById('cta').href='services.html?lang='+l;
    const url=new URL(window.location);url.searchParams.set('lang',l);
    history.replaceState(null,'',url);
  }
  const start=new URLSearchParams(location.search).get('lang');
  setLang(start==='en'?'en':'nl');
</script>
</body>
</html>
