<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diensten — AVDB Security &amp; Protection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0a1729;--navy-soft:#0e1f38;--gold:#d4af37;--gold-bright:#e8c662;
    --ink:#f4f1ea;--muted:#8b9bb0;--line:rgba(212,175,55,.22);
    --black: #000000;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background-color: var(--black);
    color:var(--ink);font-family:'Inter',system-ui,sans-serif;min-height:100vh;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;
  }
  .lang{
    position:absolute;top:clamp(16px,4vw,28px);right:clamp(16px,4vw,28px);
    display:flex;gap:2px;font-size:13px;letter-spacing:.04em;
    border:1px solid var(--line);border-radius:999px;overflow:hidden;
    background:rgba(8,18,33,.5);backdrop-filter:blur(4px);z-index:5;
  }
  .lang button{
    background:none;border:0;color:var(--muted);font-family:inherit;font-size:inherit;
    letter-spacing:inherit;padding:7px 14px;cursor:pointer;transition:color .2s,background .2s;
  }
  .lang button.active{color:var(--navy);background:var(--gold);font-weight:500}
  .lang button:not(.active):hover{color:var(--ink)}

  .wrap{flex:1;width:100%;max-width:760px;margin:0 auto;padding:clamp(64px,12vw,110px) clamp(20px,5vw,32px) clamp(40px,8vw,64px)}

  .back{
    display:inline-flex;align-items:center;gap:.5em;color:var(--muted);
    text-decoration:none;font-size:.9rem;letter-spacing:.02em;margin-bottom:clamp(28px,5vw,40px);
    transition:color .2s;
  }
  .back:hover{color:var(--gold-bright)}
  .back svg{width:1em;height:1em}

  .eyebrow{font-size:clamp(11px,2.4vw,12px);letter-spacing:.34em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:14px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(2.3rem,7vw,3.4rem);line-height:1.05;margin-bottom:clamp(14px,3vw,18px)}
  .intro{color:var(--muted);font-size:clamp(.98rem,2.4vw,1.1rem);line-height:1.6;max-width:50ch;margin-bottom:clamp(40px,7vw,56px)}

  .services{display:flex;flex-direction:column;gap:clamp(16px,3vw,20px)}
  .card{
    position:relative;border:1px solid var(--line);border-radius:16px;
    background:linear-gradient(180deg, rgba(18,36,63,.55), rgba(10,23,41,.35));
    padding:clamp(22px,4.5vw,30px);
    transition:border-color .25s, transform .25s;
  }
  .card:hover{border-color:rgba(212,175,55,.5);transform:translateY(-2px)}
  .card .ico{
    width:42px;height:42px;border-radius:11px;display:grid;place-items:center;
    background:rgba(212,175,55,.1);border:1px solid var(--line);color:var(--gold-bright);
    margin-bottom:18px;
  }
  .card .ico svg{width:21px;height:21px}
  .card h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(1.4rem,4vw,1.7rem);margin-bottom:8px;letter-spacing:.005em}
  .card p{color:var(--muted);font-size:clamp(.92rem,2.3vw,1rem);line-height:1.6}
  .card .tag{
    display:inline-block;margin-top:14px;font-size:.78rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--gold);border:1px solid var(--line);
    border-radius:999px;padding:5px 12px;
  }

  .contact{
    margin-top:clamp(44px,8vw,64px);padding-top:clamp(28px,5vw,36px);
    border-top:1px solid var(--line);text-align:center;
  }
  .contact h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(1.5rem,4.5vw,1.9rem);margin-bottom:18px}
  .contact .links{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
  .contact a{
    display:inline-flex;align-items:center;gap:.55em;text-decoration:none;color:var(--ink);
    font-size:clamp(.92rem,2.3vw,1rem);border:1px solid var(--line);border-radius:999px;
    padding:.7em 1.3em;transition:border-color .2s,color .2s,background .2s;
  }
  .contact a:hover{border-color:var(--gold);color:var(--gold-bright);background:rgba(212,175,55,.06)}
  .contact a svg{width:1.05em;height:1.05em;color:var(--gold)}
  .contact a:focus-visible{outline:2px solid var(--gold-bright);outline-offset:3px}
</style>
</head>
<body>
  <div class="lang" role="group" aria-label="Taal / Language">
    <button id="btn-nl" class="active" onclick="setLang('nl')">NL</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="wrap">
    <a class="back" id="back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
      <span id="back-text"></span>
    </a>

    <p class="eyebrow">AVDB Security &amp; Protection</p>
    <h1 id="h1"></h1>
    <p class="intro" id="intro"></p>

    <div class="services">
      <article class="card">
        <div class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18v14H3z"/><path d="M3 9h18"/><path d="M7 7h.01M10 7h.01"/></svg></div>
        <h2 id="s1-t"></h2>
        <p id="s1-d"></p>
      </article>

      <article class="card">
        <div class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5 5 5v5c0 4.3 2.9 7.6 7 9 4.1-1.4 7-4.7 7-9V5z"/><path d="m9.2 12 1.9 1.9 3.7-3.7"/></svg></div>
        <h2 id="s2-t"></h2>
        <p id="s2-d"></p>
      </article>

      <article class="card">
        <div class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg></div>
        <h2 id="s3-t"></h2>
        <p id="s3-d"></p>
        <span class="tag" id="s3-tag"></span>
      </article>
    </div>

    <div class="contact">
      <h3 id="c-title"></h3>
      <div class="links">
        <a href="mailto:contact@avdbsecurity.com">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          contact@avdbsecurity.com
        </a>
        <a href="tel:+31643115610">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L20 13l1 4v3a1 1 0 0 1-1 1A16 16 0 0 1 4 5a1 1 0 0 1 1-1z"/></svg>
          +31 6 43115610
        </a>
      </div>
    </div>
  </div>

<script>
  const t = {
    nl:{
      back:'Terug',
      h1:'Onze diensten',
      intro:'Terwijl de nieuwe website wordt gebouwd, kun je bij ons terecht voor het volgende.',
      s1t:'Webontwikkeling',
      s1d:'Snelle, moderne websites op maat — opgebouwd met veiligheid als uitgangspunt, niet als bijzaak.',
      s2t:'Security-integraties',
      s2d:'Beveiliging ingebouwd in je bestaande website en systemen, zodat je gegevens en je klanten beschermd zijn.',
      s3t:'IT-support',
      s3d:'Hulp wanneer je het nodig hebt. Je betaalt alleen voor wat je gebruikt — geen vast contract, geen verrassingen.',
      s3tag:'Pay as you go',
      ctitle:'Klaar om te starten?',
      title:'Diensten — AVDB Security & Protection'
    },
    en:{
      back:'Back',
      h1:'Our services',
      intro:'While the new website is being built, here\u2019s what we can help you with.',
      s1t:'Web development',
      s1d:'Fast, modern, custom-built websites — designed with security from the ground up, not as an afterthought.',
      s2t:'Security integrations',
      s2d:'Security built into your existing website and systems, so your data and your customers stay protected.',
      s3t:'IT support',
      s3d:'Help when you need it. You only pay for what you use — no fixed contract, no surprises.',
      s3tag:'Pay as you go',
      ctitle:'Ready to start?',
      title:'Services — AVDB Security & Protection'
    }
  };
  function setLang(l){
    const d=t[l];document.documentElement.lang=l;
    const set=(id,v)=>document.getElementById(id).textContent=v;
    set('back-text',d.back);set('h1',d.h1);set('intro',d.intro);
    set('s1-t',d.s1t);set('s1-d',d.s1d);
    set('s2-t',d.s2t);set('s2-d',d.s2d);
    set('s3-t',d.s3t);set('s3-d',d.s3d);set('s3-tag',d.s3tag);
    set('c-title',d.ctitle);document.title=d.title;
    document.getElementById('btn-nl').classList.toggle('active',l==='nl');
    document.getElementById('btn-en').classList.toggle('active',l==='en');
    document.getElementById('back').href='index.html?lang='+l;
    const url=new URL(window.location);url.searchParams.set('lang',l);
    history.replaceState(null,'',url);
  }
  const start=new URLSearchParams(location.search).get('lang');
  setLang(start==='en'?'en':'nl');
</script>
</body>
</html>
